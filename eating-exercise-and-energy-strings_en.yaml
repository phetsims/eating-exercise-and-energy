healthNote:
  title: Health Note
  body: |-
    <b>Disclaimer:</b> This simulation is for learning about simplified energy balance. It is not medical advice and does not include many health factors, such as genetics, medications, pregnancy, illness, or individual nutrition needs.<br><br>
    <b>BMI:</b> Body Mass Index compares weight with height. It is a quick estimate that can be useful for looking at patterns in groups, but it does not directly measure muscle, bone, or body fat.<br><br>
    <b>BMR:</b> Basal Metabolic Rate is the energy your body uses each day for basic functions like breathing, circulating blood, and keeping body temperature steady while resting.<br><br>
    <b>Body Fat:</b> This is the percent of body weight that is fat tissue. Some body fat is needed for stored energy, hormones, insulation, and organ protection.<br><br>
    <b>Heart Health:</b> This is a simplified score in this simulation. It improves up to 100% with activity and exercise, and decreases with body fat, but it is not a medical measurement of a real person's heart health.

